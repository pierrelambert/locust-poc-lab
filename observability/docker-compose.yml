# Observability stack — Prometheus + Grafana + Redis Exporter
# Start alongside any infra stack: make obs-up
#
# Connects to external Docker networks created by the infra stacks.
# Redis Exporter targets are configured via REDIS_ADDR env var.

services:
  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: obs-prometheus
    hostname: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - obs-net

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: obs-grafana
    hostname: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/redis-poc-overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - obs-net

  # ── Redis Exporter ──────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: obs-redis-exporter
    hostname: redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=${REDIS_ADDR:-redis://redis-primary:6379}
    networks:
      - obs-net

  # ── Locust Exporter ─────────────────────────────────────────────
  locust-exporter:
    image: containersol/locust_exporter:v0.5.0
    container_name: obs-locust-exporter
    hostname: locust-exporter
    restart: unless-stopped
    ports:
      - "9646:9646"
    environment:
      - LOCUST_EXPORTER_URI=${LOCUST_URI:-http://localhost:8089}
    networks:
      - obs-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  obs-net:
    driver: bridge

