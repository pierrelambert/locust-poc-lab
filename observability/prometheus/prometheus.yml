# Prometheus configuration for POC Lab observability stack
# Scrapes Redis Exporter and Locust metrics endpoints

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # ── Redis Exporters (one per Redis topology) ─────────────────────
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter-oss-sentinel:9121"]
        labels:
          topology: "oss-sentinel"
      - targets: ["redis-exporter-oss-cluster:9121"]
        labels:
          topology: "oss-cluster"
      - targets: ["redis-exporter-re:9121"]
        labels:
          topology: "re-cluster"
    metrics_path: /metrics

  # ── Locust metrics (via locust-exporter or built-in /stats) ─────
  - job_name: "locust"
    static_configs:
      - targets: ["locust-exporter:9646"]
        labels:
          component: "load-generator"
    metrics_path: /metrics

  # ── Prometheus self-monitoring ──────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

