# Redis Cluster node configuration — OSS Cluster stack
# Persistence: AOF every 1 sec (appendfsync everysec)

bind 0.0.0.0
protected-mode no
port 6379

# Cluster
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-announce-hostname ""

# Persistence
appendonly yes
appendfsync everysec
save ""

# Memory
maxmemory-policy noeviction

# Logging
loglevel notice

