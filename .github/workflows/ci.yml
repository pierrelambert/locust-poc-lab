name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml

      - name: Python syntax check
        run: |
          python -m py_compile workloads/__init__.py
          find workloads -name '*.py' -not -path '*/__pycache__/*' \
            -exec python -m py_compile {} +
          find observability -name '*.py' -not -path '*/__pycache__/*' \
            -exec python -m py_compile {} +

      - name: YAML validation
        run: |
          python -c "
          import yaml, sys
          from pathlib import Path
          errors = []
          for f in sorted(Path('workloads/profiles').glob('*.yaml')):
              try:
                  yaml.safe_load(f.read_text())
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          print(f'Validated {len(list(Path(\"workloads/profiles\").glob(\"*.yaml\")))} profiles OK')
          "

      - name: Bash syntax check
        run: |
          find . -name '*.sh' -print0 | xargs -0 -n1 bash -n

  smoke-tests:
    name: Smoke Tests
    needs: static-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml

      - name: Run smoke tests (non-Docker)
        run: |
          pytest tests/smoke/ -k "not docker" -v --tb=short

  docker-smoke:
    name: Docker Smoke Tests
    needs: smoke-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml

      - name: Run Docker smoke tests
        run: |
          pytest tests/smoke/test_docker_oss_sentinel.py -v --tb=short -m docker

