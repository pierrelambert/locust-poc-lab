workload:
  name: "session_mixed"
  description: "Login and session-state store — 70/30 read/write ratio"

  connection:
    host: "localhost"
    port: 6379
    password: "${REDIS_PASSWORD}"
    db: 0
    ssl: false
    socket_timeout: 5.0
    retry_on_timeout: true
    max_connections: 50

  key_config:
    pattern: "session:{user_id}"
    key_space_size: 50000
    hot_key_count: 0
    hot_key_percentage: 0

  data_config:
    value_size_min: 256
    value_size_max: 1024
    value_type: "json"
    ttl_min: 1800
    ttl_max: 1800

  traffic_config:
    read_ratio: 70
    write_ratio: 30
    think_time_min_ms: 10
    think_time_max_ms: 50
    think_time_distribution: "uniform"
    target_rps: 5000

  seeding:
    enabled: true
    key_count: 50000
    batch_size: 1000
    verify_after_seed: true
    random_seed: 42

  replica_reads:
    enabled: false
    policy: "none"

