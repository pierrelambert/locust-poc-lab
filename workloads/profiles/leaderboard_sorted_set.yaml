workload:
  name: "leaderboard_sorted_set"
  description: "Ranking system with sorted sets — 80/20 read/write ratio"

  connection:
    host: "localhost"
    port: 6379
    password: "${REDIS_PASSWORD}"
    db: 0
    ssl: false
    socket_timeout: 5.0
    retry_on_timeout: true
    max_connections: 50

  key_config:
    pattern: "leaderboard:{board_id}"
    key_space_size: 50
    hot_key_count: 0
    hot_key_percentage: 0

  data_config:
    value_size_min: 16
    value_size_max: 32
    value_type: "string"
    ttl_min: 0
    ttl_max: 0

  traffic_config:
    read_ratio: 80
    write_ratio: 20
    think_time_min_ms: 10
    think_time_max_ms: 30
    think_time_distribution: "uniform"
    target_rps: 5000

  seeding:
    enabled: true
    key_count: 50
    batch_size: 1000
    verify_after_seed: true
    random_seed: 42

  replica_reads:
    enabled: false
    policy: "none"

