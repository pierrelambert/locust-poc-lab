workload:
  name: "stream_ingest"
  description: "Event pipeline with Redis Streams — 50/50 producer/consumer ratio"

  connection:
    connection_mode: "standalone"
    host: "localhost"
    port: 6379
    password: "${REDIS_PASSWORD}"
    db: 0
    ssl: false
    socket_timeout: 5.0
    retry_on_timeout: true
    max_connections: 50

  key_config:
    pattern: "stream:{topic}:{partition}"
    key_space_size: 10
    hot_key_count: 0
    hot_key_percentage: 0

  data_config:
    value_size_min: 256
    value_size_max: 1024
    value_type: "json"
    ttl_min: 0
    ttl_max: 0

  traffic_config:
    read_ratio: 50
    write_ratio: 50
    think_time_min_ms: 2
    think_time_max_ms: 10
    think_time_distribution: "uniform"
    target_rps: 10000

  seeding:
    enabled: true
    key_count: 10
    batch_size: 1000
    verify_after_seed: false
    random_seed: 42

  replica_reads:
    enabled: false
    policy: "none"

